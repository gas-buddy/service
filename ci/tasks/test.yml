---
platform: linux

image_resource:
  type: docker-image
  source:
    repository: node
    tag: 8

inputs:
  - name: gasbuddy-service
    path: /src
  - name: dependency-cache
    path: /cache

run:
  path: sh
  args:
    - -exc
    - |
      mv cache/node_modules src
      cd src && npm run lint && npm run --silent ci-test && npm run --silent ci-cover
